; PlatformIO Project Configuration File
;
; Pip-Boy ADV - M5Stack Cardputer ADV Exclusive Build
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:cardputer-adv]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

build_flags =
  -I include
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -DCORE_DEBUG_LEVEL=0
  -DRADIOLIB_GODMODE

lib_deps = 
  m5stack/M5Unified@^0.1.16
  m5stack/M5GFX@^0.1.16
  lvgl/lvgl@^8.3.11
  bblanchon/ArduinoJson@^6.21.3
  adafruit/Adafruit NeoPixel@^1.12.3
  jgromes/RadioLib@^6.4.0

; Serial Configuration
monitor_speed = 115200
monitor_filters = 
  default
  time

; Upload Configuration (auto-detect if not specified)
; If upload fails, manually set: upload_port = COM4
upload_speed = 1500000
upload_port =  ; Auto-detect (leave empty for auto-detection)

; Data folder for SD card filesystem image (optional)
board_build.filesystem = littlefs

; Auto-versioning script
extra_scripts = pre:auto_version.py
